<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角机构档案库</title>
    <link rel="stylesheet" href="./css/style-index.css">
</head>
<body>
    <div class="card">
        <div class="logo">📁</div>
        <h1>内部文档门户</h1>
        <div class="sub">输入密码获取对应文档</div>

        <div class="input-group">
            <label>访问密码</label>
            <input type="text" id="passwordInput" placeholder="请输入密码" autocomplete="off" autofocus>
        </div>

        <button id="submitBtn">访问文档 →</button>

        <div id="messageBox" class="message"></div>
        <div class="footer">请确认权限</div>
    </div>

    <script src="./main/script-index.js"></script>
</body>
</html>
