<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内部文档门户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px 32px;
            width: 100%;
            max-width: 440px;
        }

        .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #0f172a;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .sub {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background: #f8fafc;
            transition: all 0.2s;
            outline: none;
            font-family: monospace;
        }

        input:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 14px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            display: block;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📁</div>
        <h1>内部文档门户</h1>
        <div class="sub">输入密码获取对应文档</div>

        <div class="input-group">
            <label>访问密码</label>
            <input type="password" id="passwordInput" placeholder="请输入密码" autocomplete="off" autofocus>
        </div>

        <button id="submitBtn">访问文档 →</button>

        <div id="messageBox" class="message"></div>
        <div class="footer">文档存储在私有 Git 仓库 · 密码由管理员分配</div>
    </div>

    <script>
        // ============================================================
        // 🔧 配置区域：密码 → 仓库内文档的相对路径
        // ============================================================
        
        // 基础路径：你的 Git 仓库托管地址（开启 Pages 后获得）
  
        const BASE_URL = "https://你的用户名.github.io/你的仓库名/";
        
        // 密码映射：密码 → 文档相对路径（相对于 docs/ 文件夹）
        const PASSWORD_MAP = {
            // 格式："密码" : "文档相对路径"
            "冻酸奶": "docs\三角机构-Triangle Agency特工手册.pdf",
            "projectX": "docs/project-plan.pdf",
            "finance88": "docs/finance-report.html",
            "internal": "docs/internal/secret-doc.md"
        };
        
        // ============================================================

        const passwordInput = document.getElementById('passwordInput');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');

        function showError(msg) {
            messageBox.textContent = msg;
            messageBox.className = 'message error';
            setTimeout(() => {
                if (messageBox.className === 'message error') {
                    messageBox.style.display = 'none';
                    messageBox.className = 'message';
                }
            }, 3000);
        }

        function hideMessage() {
            messageBox.style.display = 'none';
            messageBox.className = 'message';
        }

        function validateAndRedirect() {
            const inputPassword = passwordInput.value;
            hideMessage();
            
            if (!inputPassword.trim()) {
                showError('⚠️ 请输入密码');
                passwordInput.focus();
                return;
            }
            
            const relativePath = PASSWORD_MAP[inputPassword];
            
            if (relativePath) {
                // 构建完整访问URL
                const fullUrl = BASE_URL + relativePath;
                console.log(`✅ 密码匹配成功，跳转到: ${fullUrl}`);
                window.location.href = fullUrl;
            } else {
                showError('❌ 密码错误，无访问权限');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        submitBtn.addEventListener('click', validateAndRedirect);
        passwordInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                validateAndRedirect();
            }
        });
        
        passwordInput.addEventListener('focus', function() {
            hideMessage();
        });
        
        console.log(`🔐 文档门户已启动，配置 ${Object.keys(PASSWORD_MAP).length} 个文档`);
    </script>
</body>
</html>
